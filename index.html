    <script>
      // Prevent third-party scripts (like trackers/pixels) from crashing the page on circular structures (e.g. React 19 Elements/Events)
      (function() {
        var originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          var seen = new WeakSet();
          function safeReplacer(key, val) {
            if (val && typeof val === 'object') {
              // Gracefully handle DOM nodes
              if (val instanceof HTMLElement || (typeof val.nodeType === 'number' && typeof val.nodeName === 'string')) {
                return '[HTMLElement]';
              }
              // Skip React 18/19 internals
              if (key.startsWith('__react') || key.startsWith('__reactFiber') || key.startsWith('__reactProps') || key.startsWith('__reactEvents')) {
                return undefined;
              }
              if (seen.has(val)) {
                return '[Circular]';
              }
              seen.add(val);
            }
            if (typeof replacer === 'function') {
              return replacer(key, val);
            }
            return val;
          }
          try {
            return originalStringify(value, replacer || safeReplacer, space);
          } catch (err) {
            try {
              return originalStringify(value, safeReplacer, space);
            } catch (e) {
              return '"[Unserializable]"';
            }
          }
        };
      })();
    </script>
